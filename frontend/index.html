<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>ระบบจัดการคลังยา รพ.สต.</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- หน้าจอเข้าสู่ระบบ -->
  <div id="login-screen" class="login-screen hidden">
    <form id="login-form" class="login-card">
      <div class="login-logo"><span data-lucide="pill"></span></div>
      <h1 id="login-title">ระบบจัดการคลังยา</h1>
      <p class="muted" id="login-subtitle">โรงพยาบาลส่งเสริมสุขภาพประจำตำบล</p>
      <label>ชื่อผู้ใช้
        <input type="text" id="login-username" autocomplete="username" required />
      </label>
      <label>รหัสผ่าน
        <input type="password" id="login-password" autocomplete="current-password" required />
      </label>
      <div id="login-error" class="form-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-block">เข้าสู่ระบบ</button>
    </form>
  </div>

  <!-- โครงแอปหลัก -->
  <div id="app-shell" class="app-shell hidden">
    <header class="topbar">
      <button class="icon-btn" id="menu-toggle" aria-label="เมนู"><span data-lucide="menu"></span></button>
      <div class="brand">
        <span data-lucide="pill"></span>
        <span id="brand-name">คลังยา รพ.สต.</span>
      </div>
      <div class="topbar-right">
        <span id="user-badge" class="badge"></span>
        <button class="icon-btn" id="logout-btn" aria-label="ออกจากระบบ"><span data-lucide="log-out"></span></button>
      </div>
    </header>

    <nav id="sidebar" class="sidebar">
      <a href="#/dashboard" data-nav><span data-lucide="home"></span> หน้าหลัก</a>
      <a href="#/receive" data-nav><span data-lucide="download"></span> รับเข้า</a>
      <a href="#/locations-stock" data-nav><span data-lucide="map-pin"></span> ยาแต่ละจุด</a>
      <a href="#/transfer" data-nav><span data-lucide="shuffle"></span> แลก/ย้ายยา</a>
      <a href="#/catalog" data-nav data-min-role="pharmacist"><span data-lucide="package"></span> โครงสร้างคลัง</a>
      <a href="#/history" data-nav><span data-lucide="history"></span> ประวัติเคลื่อนไหว</a>
      <a href="#/settings" data-nav><span data-lucide="settings"></span> ตั้งค่า</a>
      <a href="#/help" data-nav><span data-lucide="help-circle"></span> คู่มือใช้งาน</a>
    </nav>
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <main id="view" class="view"></main>
  </div>

  <!-- ที่วาง modal / toast -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <!-- ไลบรารีภายนอก (CDN) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- โค้ดแอป -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/exporter.js"></script>
  <script src="assets/js/thai-font.js"></script>
  <script src="assets/js/components/toast.js"></script>
  <script src="assets/js/components/modal.js"></script>
  <script src="assets/js/components/scanner.js"></script>
  <script src="assets/js/views/dashboard.js"></script>
  <script src="assets/js/views/receive.js"></script>
  <script src="assets/js/views/locations-stock.js"></script>
  <script src="assets/js/views/transfer.js"></script>
  <script src="assets/js/views/catalog.js"></script>
  <script src="assets/js/views/history.js"></script>
  <script src="assets/js/views/settings.js"></script>
  <script src="assets/js/views/help.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
